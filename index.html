<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Portfolio</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #fff0f6;
      --primary: #c2185b;
      --accent: #ec407a;
      --soft: #ffd6e7;
      --text: #2a1f24;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    header {
      padding: 80px 20px 40px;
      text-align: center;
      background: linear-gradient(135deg, #ffe3ee, #ffffff);
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      color: var(--primary);
    }

    header p {
      margin-top: 10px;
      font-size: 1.1rem;
      color: var(--accent);
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 15px;
      background: white;
      position: sticky;
      top: 0;
      border-bottom: 1px solid var(--soft);
    }

    nav a {
      text-decoration: none;
      color: var(--primary);
      font-weight: 500;
    }

    section {
      max-width: 900px;
      margin: auto;
      padding: 60px 20px;
    }

    h2 {
      font-family: 'Playfair Display', serif;
      color: var(--primary);
      margin-bottom: 20px;
    }
